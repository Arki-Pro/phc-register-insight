<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHC Register Entry</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg border border-slate-200 p-6 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-emerald-700">PHC Inventory Entry</h1>
            <p class="text-slate-500 text-sm">Upload Register Page (JPG/PNG)</p>
        </div>

        <div id="dropZone" class="border-2 border-dashed border-emerald-300 rounded-xl p-8 text-center bg-emerald-50 cursor-pointer">
            <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="previewFile()">
            <div onclick="document.getElementById('fileInput').click()">
                <p class="text-emerald-700 font-semibold" id="uploadLabel">Tap to select photo</p>
                <img id="preview" class="hidden mt-4 rounded-lg shadow-sm mx-auto max-h-40">
            </div>
        </div>

        <button onclick="processRegister()" id="actionBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-md transition-all">
            Start Processing
        </button>

        <div id="result" class="hidden space-y-3">
            <h2 class="font-bold text-slate-700 uppercase text-xs tracking-wider">Extracted Data:</h2>
            <div id="dataList" class="bg-slate-100 p-4 rounded-xl text-slate-800 text-sm font-mono overflow-x-auto"></div>
        </div>
    </div>

    <script>
        // 🚨 IMPORTANT: Replace with your final Render URL once deployed!
        const BACKEND_URL = "https://your-service-name.onrender.com"; 

        function previewFile() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onload = e => {
                const img = document.getElementById('preview');
                img.src = e.target.result;
                img.classList.remove('hidden');
                document.getElementById('uploadLabel').innerText = "Selected: " + file.name;
            };
            reader.readAsDataURL(file);
        }

        async function processRegister() {
            const btn = document.getElementById('actionBtn');
            const file = document.getElementById('fileInput').files[0];
            const resultDiv = document.getElementById('result');
            const dataList = document.getElementById('dataList');

            if (!file) return alert("Photo select kar pehle!");

            btn.disabled = true;
            btn.innerText = "Analyzing register...";
            resultDiv.classList.add('hidden');

            const formData = new FormData();
            formData.append("file", file);

            try {
                const res = await fetch(`${BACKEND_URL}/api/digitalize-register`, {
                    method: "POST",
                    body: formData
                });
                
                const json = await res.json();
                
                // Parsing the inner JSON string returned by Gemini
                const extractedData = JSON.parse(json.data);
                
                resultDiv.classList.remove('hidden');
                dataList.innerHTML = `<pre>${JSON.stringify(extractedData, null, 2)}</pre>`;
                btn.innerText = "Done!";
            } catch (e) {
                alert("Error: " + e.message);
                btn.innerText = "Start Processing";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

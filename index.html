<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHC Digitalization Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans flex flex-col items-center justify-center p-6">

    <div class="max-w-xl w-full bg-slate-800 border border-slate-700 rounded-2xl p-6 shadow-xl space-y-6">
        <div class="text-center">
            <h1 class="text-xl font-bold bg-gradient-to-r from-emerald-400 to-cyan-400 bg-clip-text text-transparent">
                PHC Register Digitalization Engine
            </h1>
            <p class="text-slate-400 text-xs mt-1">Upload register logs to trigger automated inventory extraction</p>
        </div>

        <div class="border-2 border-dashed border-slate-600 hover:border-emerald-500 rounded-xl p-8 text-center cursor-pointer bg-slate-900/50 relative group transition-all">
            <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="updateFileName(event)">
            <div class="space-y-2">
                <span class="text-4xl block group-hover:scale-110 transition-transform">📤</span>
                <p class="text-sm font-medium text-slate-300" id="uploadText">Click or Drag register image here</p>
                <p class="text-xs text-slate-500">Supports JPG, PNG (Max 5MB)</p>
            </div>
        </div>

        <button onclick="uploadAndProcess()" id="processBtn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white font-medium py-3 rounded-xl transition-all shadow-lg cursor-pointer">
            Extract Data via Gemini
        </button>

        <div class="space-y-2">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Engine Output:</span>
            <div id="outputDisplay" class="bg-slate-900 border border-slate-700/60 rounded-xl p-4 font-mono text-xs overflow-y-auto max-h-60 text-emerald-400">
                <span class="text-slate-500 italic">No logs active. Upload an image to start parse pipeline.</span>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "https://symmetrical-funicular-459jq54p97hqrqg-8000.app.github.dev";

        function updateFileName(event) {
            const input = event.target;
            if (input.files && input.files[0]) {
                document.getElementById('uploadText').innerText = input.files[0].name;
            }
        }

        async function uploadAndProcess() {
            const fileInput = document.getElementById('fileInput');
            const btn = document.getElementById('processBtn');
            const output = document.getElementById('outputDisplay');

            if (!fileInput.files || !fileInput.files[0]) {
                alert("Bhai, pehle photo toh select kar!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing via Pipeline...";
            output.innerHTML = '<span class="text-cyan-400 animate-pulse">Sending multipart chunks to FastAPI endpoint...</span>';

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                const response = await fetch(`${BACKEND_URL}/api/digitalize-register`, {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);

                const data = await response.json();
                output.innerHTML = `<pre class="whitespace-pre-wrap">${JSON.stringify(data, null, 2)}</pre>`;

            } catch (error) {
                console.error(error);
                output.innerHTML = `<span class="text-red-400">Pipeline Error: ${error.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Extract Data via Gemini";
            }
        }
    </script>
</body>
</html>
